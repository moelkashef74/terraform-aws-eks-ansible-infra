---
# tasks file for nginx
- name: Update apt package cache
  apt:
    update_cache: yes

- name: install jenkins dependencies
  apt:
    name:
      - openjdk-21-jdk
      - curl
      - git
    state: present 

- name: create keyrings directory
  file:
    path: /etc/apt/keyrings
    state: directory

- name: Download Jenkins GPG key
  get_url:
    url: https://pkg.jenkins.io/debian-stable/jenkins.io-2026.key
    dest: /etc/apt/keyrings/jenkins-keyring.asc
    mode: '0644'

- name: Add Jenkins repository
  apt_repository:
    repo: "deb [signed-by=/etc/apt/keyrings/jenkins-keyring.asc] https://pkg.jenkins.io/debian-stable binary/"
    state: present

- name: Update apt package cache
  apt:
    update_cache: yes

- name: install jenkins
  apt:
    name: jenkins
    state: present

- name: Enable and start Jenkins
  service:
    name: jenkins
    state: started
    enabled: yes

- name: Read Jenkins initial admin password
  command: cat /var/lib/jenkins/secrets/initialAdminPassword
  register: jenkins_password
  changed_when: false

- name: Show Jenkins initial password
  debug:
    msg: "Initial Jenkins password: {{ jenkins_password.stdout }}"